<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026 Oscar Pool Picks & Predictions</title>
  <style>
    /* ----- CORE VARIABLES ----- */
    :root {
      --bg: #0b0f19;
      --surface: #151a28;
      --surface-hover: #1c2235;
      --surface-border: rgba(255, 255, 255, 0.08);
      --text: #f0f2f5;
      --text-muted: #94a3b8;
      --gold: #f5c451;
      --gold-dim: rgba(245, 196, 81, 0.15);
      --gold-grad: linear-gradient(90deg, #f5c451 0%, #f29d38 100%);
      --lock: #10b981;
      --strong: #3b82f6;
      --lean: #f59e0b;
      --toss: #ef4444;
      --font-main: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      -webkit-font-smoothing: antialiased;
    }

    /* ----- HEADER & HERO ----- */
    .hero {
      text-align: center;
      padding: 60px 20px 40px;
      background: radial-gradient(circle at top, rgba(245, 196, 81, 0.08), transparent 60%), 
                  linear-gradient(180deg, #0e1320 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--surface-border);
    }
    
    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--gold);
      text-transform: uppercase;
    }
    
    .hero p {
      max-width: 600px;
      margin: 16px auto 0;
      color: var(--text-muted);
      font-size: 1.1rem;
      line-height: 1.5;
    }

    /* ----- TABS / NAVIGATION ----- */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--surface-border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    .tab-btn:hover { background: rgba(255, 255, 255, 0.08); }
    .tab-btn.active {
      background: var(--gold-dim);
      border-color: rgba(245, 196, 81, 0.4);
      color: var(--gold);
      box-shadow: 0 0 20px rgba(245, 196, 81, 0.1);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .section { display: none; opacity: 0; transition: opacity 0.3s ease; }
    .section.active { display: block; opacity: 1; }

    /* ----- DIGITAL BALLOT RECREATION (Unchanged & Awesome) ----- */
    .ballot-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      background: var(--surface);
      padding: 16px 24px;
      border-radius: 12px;
      border: 1px solid var(--surface-border);
    }

    .ballot-actions h2 { margin: 0; font-size: 1.2rem; }
    .print-btn {
      background: var(--gold-grad);
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .print-btn:hover { box-shadow: 0 4px 15px rgba(245, 196, 81, 0.3); }
    .print-btn:active { transform: scale(0.97); }

    .ballot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 40px;
      background: #eef1f6;
      padding: 40px;
      border-radius: 12px;
      color: #111;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
    }

    .ballot-col { display: flex; flex-direction: column; gap: 24px; }
    
    .cat-group h3 {
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      margin: 0 0 12px 0;
      padding-bottom: 4px;
      border-bottom: 2px solid #ccc;
    }

    .nominee {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid #999;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    .nominee.checked .checkbox {
      background: #000;
      border-color: #000;
    }
    .nominee.checked .checkbox::after {
      content: "✔";
      color: #fff;
      font-size: 12px;
    }
    .nominee.checked span { font-weight: bold; }

    .tiebreaker-box {
      grid-column: 1 / -1;
      border-top: 2px solid #ccc;
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }

    .tb-line { font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .tb-answer { border-bottom: 1px solid #000; padding: 0 10px; color: #444; }

    /* ----- NEW ANALYSIS CARDS DESIGN ----- */
    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 24px;
    }

    .card {
      background: linear-gradient(145deg, var(--surface) 0%, #0f131f 100%);
      border: 1px solid var(--surface-border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.2s ease, border-color 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.15);
    }

    /* Top tier color bar */
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
    }
    .card.lock::before { background: var(--lock); box-shadow: 0 0 15px var(--lock); }
    .card.strong::before { background: var(--strong); box-shadow: 0 0 15px var(--strong); }
    .card.lean::before { background: var(--lean); box-shadow: 0 0 15px var(--lean); }
    .card.toss-up::before { background: var(--toss); box-shadow: 0 0 15px var(--toss); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card h3 { margin: 0; font-size: 0.95rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    
    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.lock { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
    .badge.strong { background: rgba(59, 130, 246, 0.15); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }
    .badge.lean { background: rgba(245, 158, 11, 0.15); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }
    .badge.toss-up { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }

    .pick-highlight {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--gold);
      line-height: 1.2;
      margin-bottom: 16px;
    }

    /* Progress Bar */
    .conf-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%;
      background: var(--gold-grad);
      border-radius: 999px;
      box-shadow: 0 0 10px rgba(245, 196, 81, 0.5);
    }

    /* Data Grid */
    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
      background: rgba(0,0,0,0.2);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.03);
    }
    
    .data-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .data-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
    .data-value { font-size: 0.95rem; font-weight: 700; color: #fff; }
    .data-value.dim { color: #cbd5e1; font-weight: 500; font-size: 0.85rem;}
    
    .challenger-row {
      font-size: 0.85rem;
      margin-bottom: 16px;
      padding-left: 12px;
      border-left: 2px solid rgba(255,255,255,0.1);
      color: #cbd5e1;
    }
    .challenger-row strong { color: #fff; }

    .reasoning {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #94a3b8;
      flex-grow: 1;
      margin-bottom: 16px;
    }

    /* Source Tags */
    .source-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .source-tag {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      color: #cbd5e1;
    }

    /* ----- PRINT STYLES ----- */
    @media print {
      body { background: #fff; color: #000; }
      .hero, .tabs, .ballot-actions, #analysis-section { display: none !important; }
      .container { padding: 0; margin: 0; max-width: 100%; }
      .ballot-grid {
        background: #fff;
        padding: 0;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        font-size: 10pt;
        box-shadow: none;
      }
      .cat-group h3 { font-size: 10pt; border-bottom: 1px solid #000; margin-bottom: 8px; }
      .nominee { margin-bottom: 4px; font-size: 9pt; }
      .checkbox { width: 12px; height: 12px; border: 1px solid #000; }
      .nominee.checked .checkbox { background: #ccc; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .nominee.checked .checkbox::after { font-size: 9px; color: #000; }
      .tiebreaker-box { padding-top: 10px; border-top: 1px solid #000; }
    }
    
    @media (max-width: 768px) {
      .ballot-grid { padding: 20px; grid-template-columns: 1fr; }
      .analysis-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

        challenger: "I Lied To You - Sinners", tier: "lock", 
        text: "Golden already won the Globe, gets the Vanity Fair pick, and Polymarket keeps it well ahead. I would not get cute here.", 
        sources:["Vanity Fair", "Golden Globes", "Polymarket"],
        noms:["“Dear Me” from Diane Warren", "“Golden” from KPop Demon Hunters", "“I Lied To You” from Sinners", "“Sweet Dreams Of Joy” from Viva Verdi!", "“Train Dreams” from Train Dreams"] 
      },
      { 
        cat: "Production Design", pick: "Frankenstein", 
        base_pct: 88, combined_pct: 89, market: "Frankenstein - 90%", 
        challenger: "Sinners", tier: "lock", 
        text: "This is another Frankenstein tech race. BAFTA and Vanity Fair both point there, and even Deadline's indexed snippet did too.", 
        sources:["Vanity Fair", "Deadline", "BAFTA", "Polymarket"],
        noms:["Frankenstein", "Hamnet", "Marty Supreme", "One Battle after Another", "Sinners"] 
      },
      { 
        cat: "Sound", pick: "F1", 
        base_pct: 75, combined_pct: 76, market: "F1 - 79%", 
        challenger: "Sinners", tier: "strong", 
        text: "F1 has the best sound-specific precursor on the board after taking the CAS top prize, and Vanity Fair also calls it. This feels sturdier than the picture titles in the category.", 
        sources:["Vanity Fair", "CAS", "MPSE context", "Polymarket"],
        noms:["F1", "Frankenstein", "One Battle after Another", "Sinners", "Sirât"] 
      },
      { 
        cat: "Visual Effects", pick: "Avatar: Fire and Ash", 
        base_pct: 91, combined_pct: 92, market: "Avatar: Fire and Ash - 93%", 
        challenger: "F1 / Sinners", tier: "lock", 
        text: "Visual Effects is doing what this category usually does: follow the biggest technical branch signal. Avatar won the VES prize and gets Vanity Fair's vote too.", 
        sources: ["Vanity Fair", "VES", "Polymarket"],
        noms:["Avatar: Fire and Ash", "F1", "Jurassic World Rebirth", "The Lost Bus", "Sinners"] 
      },
      { 
        cat: "Adapted Screenplay", pick: "One Battle after Another", 
        base_pct: 94, combined_pct: 95, market: "One Battle after Another - 96%",

      }
    ];

    // Column groupings based precisely on the PDF provided
    const col1Cats =["Actor in a Leading Role", "Actor in a Supporting Role", "Actress in a Leading Role", "Actress in a Supporting Role", "Animated Feature Film", "Animated Short Film", "Casting", "Cinematography"];
    const col2Cats =["Best Picture", "Costume Design", "Directing", "Documentary Feature Film", "Documentary Short Film", "Film Editing", "International Feature Film", "Live Action Short Film"];
    const col3Cats =["Makeup and Hairstyling", "Original Score", "Original Song", "Production Design", "Sound", "Visual Effects", "Adapted Screenplay", "Original Screenplay"];

    function buildBallotColumn(cats) {
      let html = `<div class="ballot-col">`;
      cats.forEach(catName => {
        const catData = oscarData.find(d => d.cat === catName);
        if(!catData) return;
        
        html += `<div class="cat-group"><h3>${catName}</h3>`;
        catData.noms.forEach(nom => {
          // Splitting at the comma to match the pick string safely
          const movieTitleMatch = catData.pick.split(" - ")[0].trim();
          const isWinner = nom.includes(movieTitleMatch);
          html += `
            <div class="nominee ${isWinner ? 'checked' : ''}">
              <div class="checkbox"></div>
              <span>${nom}</span>
            </div>
          `;
        });
        html += `</div>`;
      });
      html += `</div>`;
      return html;
    }

    // Render Ballot
    const ballotContainer = document.getElementById('ballot-container');
    ballotContainer.innerHTML = buildBallotColumn(col1Cats) + buildBallotColumn(col2Cats) + buildBallotColumn(col3Cats);
    
    // Append Tiebreakers to the bottom of the ballot grid
    ballotContainer.innerHTML += `
      <div class="tiebreaker-box">
        <div class="tb-line">Length of Show (Tiebreaker): <span class="tb-answer">3 hours, 32 minutes</span></div>
        <div class="tb-line">Worst Dressed Attendee (Extra Credit): <span class="tb-answer">Timothée Chalamet</span></div>
      </div>
    `;

    // Render Rich Analysis Cards
    const analysisContainer = document.getElementById('analysis-container');
    let analysisHTML = "";
    oscarData.forEach(d => {
      
      // Build source tags
      let sourceHTML = d.sources.map(s => `<span class="source-tag">${s}</span>`).join("");

      analysisHTML += `
        <div class="card ${d.tier}">
          <div class="card-header">
            <h3>${d.cat}</h3>
            <span class="badge ${d.tier}">${d.tier}</span>
          </div>
          
          <div class="pick-highlight">${d.pick}</div>
          
          <div class="conf-bar-bg">
            <div class="conf-bar-fill" style="width: ${d.combined_pct}%;"></div>
          </div>

          <div class="data-grid">
            <div class="data-item">
              <span class="data-label">Base Model</span>
              <span class="data-value">${d.base_pct}%</span>
            </div>
            <div class="data-item">
              <span class="data-label">W/ Polymarket</span>
              <span class="data-value">${d.combined_pct}%</span>
            </div>
            <div class="data-item" style="grid-column: span 2; margin-top: 4px;">
              <span class="data-label">Market Leader</span>
              <span class="data-value dim">${d.market}</span>
            </div>
          </div>

          <div class="challenger-row">
            Closest Challenger:<br><strong>${d.challenger}</strong>
          </div>

          <div class="reasoning">${d.text}</div>

          <div class="source-tags">
            ${sourceHTML}
          </div>
        </div>
      `;
    });
    analysisContainer.innerHTML = analysisHTML;

  </script>
